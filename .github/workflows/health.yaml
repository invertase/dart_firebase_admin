name: Health

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, labeled, unlabeled]

jobs:
  health:
    uses: dart-lang/ecosystem/.github/workflows/health.yaml@main
    with:
      # Omit 'license' and check as it is handled by addlicense in build.yml
      # and might fail on Apache license defaults.
      # Omit 'coverage' as that is also already handled
      checks: 'version,changelog,breaking,do-not-submit,leaking,unused-dependencies'
    permissions:
      pull-requests: write
