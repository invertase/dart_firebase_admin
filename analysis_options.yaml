include: package:dart_flutter_team_lints/analysis_options.yaml
analyzer:
  errors:
    lines_longer_than_80_chars: ignore
  exclude:
    - packages/firebase_admin_sdk/example_server_app/**
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true

linter:
  rules:
    - unnecessary_ignore
