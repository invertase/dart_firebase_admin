name: google_cloud_firestore
description: >-
  A Dart client library for Google Cloud Firestore, a flexible, scalable
  database for mobile, web, and server development from Firebase and
  Google Cloud.
resolution: workspace
version: 0.5.2
repository: https://github.com/firebase/firebase-admin-dart/tree/main/packages/google_cloud_firestore

environment:
  sdk: ^3.9.0

dependencies:
  collection: ^1.19.1
  google_cloud: '>=0.4.0 <0.6.0'
  google_cloud_firestore_v1: ^0.5.2
  google_cloud_protobuf: ^0.5.2
  google_cloud_rpc: ^0.5.2
  google_cloud_type: ^0.5.2
  googleapis_auth: ^2.3.0
  http: ^1.6.0
  intl: ^0.20.0
  meta: ^1.17.0

dev_dependencies:
  build_runner: ^2.4.7
  mocktail: ^1.0.2
  test: ^1.26.3
