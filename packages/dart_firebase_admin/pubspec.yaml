name: dart_firebase_admin
description: A Firebase Admin SDK implementation for Dart.
version: 0.4.1
homepage: "https://github.com/invertase/dart_firebase_admin"
repository: "https://github.com/invertase/dart_firebase_admin"

environment:
  sdk: ">=3.7.0 <4.0.0"

dependencies:
  asn1lib: ^1.6.5
  collection: '>=1.18.0 <2.0.0'
  dart_jsonwebtoken: ^3.3.1
  freezed_annotation: ^3.1.0
  googleapis: ^15.0.0
  googleapis_auth: ^2.0.0
  googleapis_beta: ^9.0.0
  http: '>=1.5.0 <2.0.0'
  intl: '>=0.20.0 <1.0.0'
  jose: ^0.3.5
  meta: '>=1.9.0 <2.0.0'
  pem: ^2.0.6
  pointycastle: ^4.0.0

dev_dependencies:
  build_runner: ^2.10.4
  file: ^7.0.1
  freezed: ^3.2.4
  mocktail: ^1.0.4
  path: ^1.9.1
  test: ^1.29.0
  uuid: ^4.5.2

false_secrets:
 - /test/auth/jwt_test.dart
 - /test/client/get_id_token.js
 - /test/mock_service_account.dart